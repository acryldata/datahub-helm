{{- if gt (.Values.replicaCount | int) 1 }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s-%s" .Release.Name (regexReplaceAll "[^-a-z0-9]+" .Values.global.datahub.version "-") "hazelcast-svc" | trunc 63 | trimSuffix "-" }}
spec:
  clusterIP: None
  ports:
    - name: hazelcast
      port: 5701
      protocol: TCP
      targetPort: 5701
  selector:
    app.kubernetes.io/name: {{ include "datahub-gms.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- include "datahub-gms.applicationVersionLabels" . | trimPrefix "\n" | nindent 4 }}
  type: ClusterIP
{{- end }}

