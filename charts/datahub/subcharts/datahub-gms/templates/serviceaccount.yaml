{{- $g := .Values.global.datahub.appServiceAccount | default dict }}
{{- $gn := $g.name | default "" }}
{{- $skipDup := and $g.create $gn (eq (include "datahub-gms.serviceAccountName" .) $gn) }}
{{- if and .Values.serviceAccount.create (not $skipDup) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "datahub-gms.serviceAccountName" . }}
  labels:
    {{- include "datahub-gms.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
