{{- if and .Values.serviceMonitor.create .Values.global.datahub.monitoring.enablePrometheus -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ printf "%s-%s" .Release.Name "datahub-mce-consumer" }}
  labels:
    {{- include "datahub-mce-consumer.labels" . | nindent 4 }}
    {{- range $key, $val := .Values.serviceMonitor.extraLabels }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
  {{- with .Values.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
{{- $mode := include "datahub-mce-consumer.monitoring.metricsMode" . }}
{{- if or (eq $mode "legacy") (eq $mode "jmx_and_actuator") }}
  - port: {{ .Values.global.datahub.monitoring.portName }}
{{- if eq $mode "jmx_and_actuator" }}
    path: {{ include "datahub-mce-consumer.monitoring.jmxMetricsPath" . | quote }}
{{- end }}
    relabelings:
    - separator: /
      sourceLabels:
      - namespace
      - pod
      targetLabel: instance
{{- end }}
{{- if eq $mode "actuator_only" }}
  - port: prometheus
    path: /actuator/prometheus
    relabelings:
    - separator: /
      sourceLabels:
      - namespace
      - pod
      targetLabel: instance
{{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/name: datahub-mce-consumer
{{- end -}}