            - name: DATAHUB_UPGRADE_K8_SCALE_DOWN_MAX_RETRIES
              value: {{ .Values.datahubSystemUpdate.scaleDown.maxRetries | default 3 | quote }}
            - name: DATAHUB_UPGRADE_K8_SCALE_DOWN_LABEL_SELECTORS
              value: {{ join "," (.Values.datahubSystemUpdate.scaleDown.scaleDownDeploymentLabelSelectors | default list) | quote }}
            - name: DATAHUB_UPGRADE_K8_DEPLOYMENT_ENV_UPDATES
              value: {{ .Values.datahubSystemUpdate.scaleDown.deploymentEnvUpdates | default list | toJson | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name | quote }}
            {{- else }}
            - name: DATAHUB_UPGRADE_K8_SCALE_DOWN_ENABLED
              value: "false"
            - name: DATAHUB_UPGRADE_K8_SCALE_DOWN_JAVA_ENABLED
              value: "false"
            {{- end }}
            {{- include "datahub.semantic-search.env" . | nindent 12 }}
            - name: DATAHUB_ANALYTICS_ENABLED
              value: {{ .Values.global.datahub_analytics_enabled | quote }}
            - name: ENTITY_VERSIONING_ENABLED
              value: {{ .Values.global.datahub.entityVersioning.enabled | quote }}
            {{- if eq .Values.global.kafka.schemaregistry.type "INTERNAL" }}
            - name: SCHEMA_REGISTRY_SYSTEM_UPDATE
              value: "true"
