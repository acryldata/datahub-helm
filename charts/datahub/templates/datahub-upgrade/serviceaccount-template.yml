{{- $sa := .Values.datahubSystemUpdate.serviceAccount | default dict }}
{{- $operatorSAName := default "datahub-operator-sa" (index $sa "name") }}
{{- if index $sa "create" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $operatorSAName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
{{- end }}

{{- if index $sa "rbac" }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datahub-operator-role
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
# Allow datahub-operator service account to modify deployments
- apiGroups: ["extensions", "apps", "batch"]
  resources: ["deployments", "deployments/scale", "deployments/status", "jobs"]
  verbs: ["get", "list", "update", "patch", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["delete"]
# Allow datahub-operator to manage scale-down state ConfigMap (datahub-upgrade KubernetesScaleDownStep)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
# Allow datahub-operator to delete KEDA ScaledObjects during system-update
- apiGroups: ["keda.sh"]
  resources: ["scaledobjects"]
  verbs: ["delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datahub-operator-role-binding
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    # This resource depends on the Role and ServiceAccount in this file having been created first, hence the smaller hook-weight.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datahub-operator-role
subjects:
- kind: ServiceAccount
  name: {{ $operatorSAName }}
  namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.datahubSystemUpdate.nonblocking.enabled }}
{{- if .Values.datahubSystemUpdate.nonblocking.serviceAccount }}
{{- if .Values.datahubSystemUpdate.nonblocking.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.datahubSystemUpdate.nonblocking.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.datahubSystemUpdate.nonblocking.enabled }}
{{- if .Values.datahubSystemUpdate.nonblocking.serviceAccount }}
{{- if .Values.datahubSystemUpdate.nonblocking.serviceAccount.rbac }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datahub-operator-nonblocking-role
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
# Allow datahub-operator nonblocking service account to modify deployments
- apiGroups: ["extensions", "apps", "batch"]
  resources: ["deployments", "deployments/scale", "deployments/status", "jobs"]
  verbs: ["get", "list", "update", "patch", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["delete"]
# Allow scale-down state ConfigMap and KEDA ScaledObjects (datahub-upgrade KubernetesScaleDownStep)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: ["keda.sh"]
  resources: ["scaledobjects"]
  verbs: ["delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datahub-operator-nonblocking-role-binding
  namespace: {{ .Release.Namespace }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    # This resource depends on the Role and ServiceAccount in this file having been created first, hence the smaller hook-weight.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datahub-operator-nonblocking-role
subjects:
- kind: ServiceAccount
  name: {{ .Values.datahubSystemUpdate.nonblocking.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
